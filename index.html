<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FCasino - Classic Edition</title>

    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>

    <style>
        :root {
            --bg-felt: #0d3b1f;
            --panel-wood: #2c1609;
            --panel-border: #8c6239;
            --text-gold: #d4af37;
            --text-white: #ffffff;
            --red-sector: #991b1b;
            --black-sector: #111827;
            --green-sector: #1b4d3e;
            --shadow-classic: 0 15px 35px rgba(0, 0, 0, 0.9);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background-color: #061f10;
            background-image: radial-gradient(#113d21 20%, transparent 20%), radial-gradient(#082413 20%, transparent 20%);
            background-size: 50px 50px;
            background-position: 0 0, 25px 25px;
            color: var(--text-white);
            font-family: 'Georgia', serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
            overflow: hidden;
        }

        .container {
            background-color: var(--panel-wood);
            border: 3px solid var(--panel-border);
            border-radius: 16px;
            width: 100%;
            max-width: 550px;
            padding: 35px;
            box-shadow: var(--shadow-classic);
            display: flex;
            flex-direction: column;
            gap: 25px;
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding-bottom: 15px;
            border-bottom: 2px solid var(--panel-border);
        }

        .header h1 {
            font-size: 1.8rem;
            color: var(--text-gold);
            font-weight: bold;
            letter-spacing: 2px;
            text-transform: uppercase;
            text-shadow: 1px 2px 4px rgba(0, 0, 0, 0.8);
        }

        .balance-box {
            font-size: 1.1rem;
            font-weight: bold;
            color: var(--text-gold);
            background: rgba(44, 22, 9, 0.8);
            padding: 8px 16px;
            border-radius: 6px;
            border: 1px solid var(--panel-border);
        }

        .roulette-wrapper {
            position: relative;
            width: 360px;
            height: 360px;
            margin: 0 auto;
        }

        #rouletteCanvas {
            border-radius: 50%;
            border: 6px solid #4a2c11;
            box-shadow: inset 0 0 15px rgba(0, 0, 0, 0.9), 0 10px 20px rgba(0, 0, 0, 0.8);
            background-color: #1a1510;
        }

        .pointer {
            width: 0;
            height: 0;
            border-left: 12px solid transparent;
            border-right: 12px solid transparent;
            border-bottom: 22px solid var(--text-gold);
            position: absolute;
            top: -8px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 20;
            filter: drop-shadow(0 2px 2px rgba(0,0,0,0.8));
        }

        .controls {
            display: flex;
            flex-direction: column;
            gap: 18px;
        }

        .input-group {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .input-group label {
            font-size: 0.95rem;
            color: var(--text-gold);
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .input-group input {
            width: 100%;
            padding: 14px;
            background: #150a04;
            border: 1px solid var(--panel-border);
            border-radius: 6px;
            color: var(--text-gold);
            font-size: 1.3rem;
            font-weight: bold;
            outline: none;
            font-family: 'Georgia', serif;
            text-align: center;
            box-shadow: inset 0 2px 5px rgba(0, 0, 0, 0.8);
        }

        .buttons-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
        }

        button {
            padding: 16px;
            border: none;
            border-radius: 6px;
            font-size: 1.1rem;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.25s ease;
            color: #ffffff;
            text-transform: uppercase;
            letter-spacing: 1px;
            font-family: 'Georgia', serif;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.4);
        }

        button:disabled {
            opacity: 0.4;
            cursor: not-allowed;
            transform: none !important;
            box-shadow: none;
        }

        .btn-red {
            background: linear-gradient(135deg, #b91c1c, #7f1d1d);
            border: 1px solid #dc2626;
        }
        .btn-red:not(:disabled):hover {
            background: linear-gradient(135deg, #dc2626, #991b1b);
            transform: translateY(-2px);
        }

        .btn-black {
            background: linear-gradient(135deg, #1f2937, #111827);
            border: 1px solid #374151;
        }
        .btn-black:not(:disabled):hover {
            background: linear-gradient(135deg, #374151, #1f2937);
            transform: translateY(-2px);
        }

        .btn-login {
            background: transparent;
            border: 1px solid var(--panel-border);
            color: var(--text-gold);
            padding: 6px 16px;
            border-radius: 6px;
            font-size: 0.85rem;
            text-transform: none;
            letter-spacing: normal;
        }
        .btn-login:hover {
            background: rgba(140, 98, 57, 0.2);
        }

        #statusText {
            font-size: 0.95rem;
            text-align: center;
            color: #d1d5db;
            min-height: 25px;
            line-height: 1.4;
            text-shadow: 1px 1px 2px rgba(0, 0, 0, 0.8);
        }

        .win { color: #34d399 !important; font-weight: bold; }
        .lose { color: #f87171 !important; }
    </style>
</head>
<body>

    <div class="container">
        <div class="header">
            <h1>FCasino</h1>
            <button class="btn-login" id="loginBtn" onclick="loginAnon()">Вход</button>
        </div>

        <div class="roulette-wrapper">
            <div class="pointer"></div>
            <canvas id="rouletteCanvas" width="360" height="360"></canvas>
        </div>

        <div class="controls">
            <div class="input-group">
                <label for="betAmount">Ставка (🪙)</label>
                <input type="number" id="betAmount" value="100" min="10" step="10">
            </div>

            <div class="buttons-grid">
                <button class="btn-red" id="btnRed" onclick="makeBet('red')">Красное</button>
                <button class="btn-black" id="btnBlack" onclick="makeBet('black')">Черное</button>
            </div>
        </div>

        <div id="statusText">Инициализация...</div>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyCsd-EMW60Nmk452niquucF3wDfYkQbNlU",
            authDomain: "fcasino-64ooo.firebaseapp.com",
            projectId: "fcasino-64ooo",
            storageBucket: "fcasino-64ooo.firebasestorage.app",
            messagingSenderId: "649497478758",
            appId: "1:649497478758:web:be8656c2ce88d61d438fa7",
            measurementId: "G-DPW70MMJHJ"
        };

        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const db = firebase.firestore();

        const canvas = document.getElementById('rouletteCanvas');
        const ctx = canvas.getContext('2d');
        const statusText = document.getElementById('statusText');
        const btnRed = document.getElementById('btnRed');
        const btnBlack = document.getElementById('btnBlack');

        let currentUser = null;
        let balance = 0;
        let currentRotation = 0;
        let isSpinning = false;

        const wheelNumbers = [
            0, 32, 15, 19, 4, 21, 2, 25, 17, 34, 6, 27, 13, 36, 11, 30, 8, 23, 10,
            5, 24, 16, 33, 1, 20, 14, 31, 9, 22, 18, 29, 7, 28, 12, 35, 3, 26
        ];
        const reds = [1, 3, 5, 7, 9, 12, 14, 16, 18, 19, 21, 23, 25, 27, 30, 32, 34, 36];

        function drawWheel(angle = 0) {
            const width = canvas.width;
            const height = canvas.height;
            const radius = width / 2 - 12;
            const centerX = width / 2;
            const centerY = height / 2;

            ctx.clearRect(0, 0, width, height);

            // Отрисовка деревянной текстуры
            let woodGrad = ctx.createRadialGradient(centerX, centerY, 10, centerX, centerY, radius + 10);
            woodGrad.addColorStop(0, '#592c0c');
            woodGrad.addColorStop(0.8, '#2c1609');
            woodGrad.addColorStop(1, '#150a04');
            ctx.fillStyle = woodGrad;
            ctx.beginPath();
            ctx.arc(centerX, centerY, radius + 8, 0, Math.PI * 2);
            ctx.fill();

            ctx.save();
            ctx.translate(centerX, centerY);
            ctx.rotate(angle);

            const count = wheelNumbers.length;
            const arc = (Math.PI * 2) / count;

            for (let i = 0; i < count; i++) {
                const angleStart = i * arc;
                constEnd = constStart + arc;

                ctx.beginPath();
                ctx.moveTo(0, 0);
                ctx.arc(0, 0, radius, constStart, constEnd, false);
                ctx.closePath();

                if (wheelNumbers[i] === 0) {
                    ctx.fillStyle = '#1b4d3e'; // Зеленый
                } else if (reds.includes(wheelNumbers[i])) {
                    ctx.fillStyle = '#991b1b'; // Красный
                } else {
                    ctx.fillStyle = '#111827'; // Черный
                }

                ctx.fill();
                ctx.strokeStyle = '#d4af37'; // Золотая линия
                ctx.lineWidth = 1;
                ctx.stroke();

                ctx.save();
                ctx.rotate(constStart + arc / 2);
                ctx.textAlign = 'right';
                ctx.fillStyle = '#d4af37';
                ctx.font = 'bold 11px Georgia, serif';
                ctx.fillText(wheelNumbers[i], radius - 10, 4);
                ctx.restore();
            }

            ctx.restore();

            // Латунный центр
            ctx.beginPath();
            ctx.arc(centerX, centerY, 34, 0, Math.PI * 2);
            let centerGrad = ctx.createRadialGradient(centerX, centerY, 5, centerX, centerY, 34);
            centerGrad.addColorStop(0, '#ffe58f');
            centerGrad.addColorStop(1, '#8c6239');
            ctx.fillStyle = centerGrad;
            ctx.strokeStyle = '#d4af37';
            ctx.lineWidth = 2;
            ctx.fill();
            ctx.stroke();
        }

        function setButtonsState(disabled) {
            btnRed.disabled = disabled;
            btnBlack.disabled = disabled;
        }

        function loginAnon() {
            statusText.innerText = "Вход...";
            auth.signInAnonymously().catch((e) => {
                statusText.innerText = "Ошибка: " + e.message;
            });
        }

        auth.onAuthStateChanged((user) => {
            if (user) {
                currentUser = user;
                document.getElementById('loginBtn').innerText = "ID: " + user.uid.substring(0, 4);
                
                const userRef = db.collection('users').doc(user.uid);
                
                userRef.onSnapshot((doc) => {
                    if (doc.exists) {
                        balance = doc.data().balance;
                        updateBalanceDisplay();
                        if (!isSpinning) statusText.innerText = "Готовы сделать ставку.";
                    } else {
                        userRef.set({ balance: 5000 });
                    }
                });
                
                setButtonsState(false);
            } else {
                document.getElementById('loginBtn').innerText = "Вход";
                statusText.innerText = "Войдите в систему для игры";
                setButtonsState(true);
            }
        });

        function updateBalanceDisplay() {
            let header = document.querySelector('.header');
            let balEl = document.getElementById('userBalance');
            if (!balEl) {
                balEl = document.createElement('div');
                balEl.id = 'userBalance';
                balEl.className = 'balance-box';
                header.insertBefore(balEl, document.getElementById('loginBtn'));
            }
            balEl.innerText = `${balance} 🪙`;
        }

        async function makeBet(betType) {
            if (isSpinning || !currentUser) return;

            const betAmount = parseInt(document.getElementById('betAmount').value);
            
            if (isNaN(betAmount) || betAmount < 10) {
                statusText.innerText = "Укажите корректную сумму ставки!";
                statusText.className = 'lose';
                return;
            }

            if (betAmount > balance) {
                statusText.innerText = "Недостаточно средств на балансе";
                statusText.className = 'lose';
                return;
            }

            isSpinning = true;
            setButtonsState(true);
            statusText.innerText = "Ставка принята. Вращаем колесо...";
            statusText.className = '';

            try {
                const userRef = db.collection('users').doc(currentUser.uid);
                await userRef.update({ balance: balance - betAmount });

                const randomIndex = Math.floor(Math.random() * wheelNumbers.length);
                const winningNumber = wheelNumbers[randomIndex];
                let winningColor = (winningNumber === 0) ? 'green' : (reds.includes(winningNumber) ? 'red' : 'black');
                
                const isWin = (betType === winningColor);
                const payout = isWin ? betAmount * 2 : 0;

                let start = null;
                const duration = 7000;
                
                const count = wheelNumbers.length;
                const degreesPerSector = (Math.PI * 2) / count;
                const finalTargetAngle = randomIndex * degreesPerSector;
                const extraRotations = Math.PI * 2 * 14;
                const finalAngle = extraRotations + (Math.PI * 2 - finalTargetAngle);

                function step(timestamp) {
                    if (!start) start = timestamp;
                    const progress = (timestamp - start) / duration;
                    
                    if (progress < 1) {
                        const eased = 1 - Math.pow(1 - progress, 3);
                        drawWheel(eased * finalAngle);
                        requestAnimationFrame(step);
                    } else {
                        drawWheel(finalAngle);
                        
                        setTimeout(async () => {
                            if (isWin) {
                                await userRef.update({ balance: balance - betAmount + payout });
                                statusText.innerText = `ПОБЕДА! Выпало ${winningNumber} (${winningColor}). Выигрыш: +${payout} 🪙`;
                                statusText.className = 'win';
                            } else {
                                statusText.innerText = `Проигрыш! Выпало ${winningNumber} (${winningColor}).`;
                                statusText.className = 'lose';
                            }
                            
                            isSpinning = false;
                            setButtonsState(false);
                        }, 500);
                    }
                }
                
                requestAnimationFrame(step);

            } catch (e) {
                statusText.innerText = "Ошибка: " + e.message;
                statusText.className = 'lose';
                isSpinning = false;
                setButtonsState(false);
            }
        }

        // Первоначальный рендер колеса
        drawWheel(0);
    </script>
</body>
</html>
