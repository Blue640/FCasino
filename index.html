<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FCasino - Classic Deluxe</title>

    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>

    <style>
        :root {
            --bg-color: #030d1a;
            --accent-gold: #d4af37;
            --accent-red: #b91c1c;
            --accent-green: #15803d;
            --panel-bg: rgba(15, 23, 42, 0.95);
            --text-white: #ffffff;
            --text-gray: #94a3b8;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background-color: var(--bg-color);
            background-image: radial-gradient(circle at 10% 20%, rgba(30, 58, 138, 0.4) 0%, transparent 40%),
                              radial-gradient(circle at 90% 80%, rgba(185, 28, 28, 0.2) 0%, transparent 40%);
            color: var(--text-white);
            font-family: 'Georgia', serif;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 20px;
            overflow-x: hidden;
        }

        .header {
            width: 100%;
            max-width: 600px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px;
            background: var(--panel-bg);
            border: 2px solid var(--accent-gold);
            border-radius: 12px;
            margin-bottom: 20px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.8);
        }

        .header h1 {
            color: var(--accent-gold);
            font-size: 2rem;
            letter-spacing: 3px;
            text-transform: uppercase;
            text-shadow: 1px 2px 4px rgba(0, 0, 0, 0.8);
        }

        .panel {
            width: 100%;
            max-width: 600px;
            background: var(--panel-bg);
            border: 2px solid var(--accent-gold);
            border-radius: 16px;
            padding: 30px;
            box-shadow: 0 15px 40px rgba(0, 0, 0, 0.9);
            display: flex;
            flex-direction: column;
            gap: 25px;
        }

        .slots-container {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin: 20px 0;
        }

        .slot-reel {
            width: 100px;
            height: 120px;
            background: linear-gradient(180deg, #1e293b, #0f172a);
            border: 3px solid var(--accent-gold);
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 3.5rem;
            color: var(--accent-gold);
            text-shadow: 0 0 10px var(--accent-gold);
            box-shadow: inset 0 4px 10px rgba(0,0,0,0.8);
            transition: transform 0.3s ease;
        }

        .spin-animation {
            animation: spin 0.4s infinite alternate;
        }

        @keyframes spin {
            0% { transform: translateY(-3px); }
            100% { transform: translateY(3px); }
        }

        .controls {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .input-group {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .input-group label {
            font-size: 0.9rem;
            color: var(--accent-gold);
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .input-group input {
            width: 100%;
            padding: 12px;
            background: #0b1321;
            border: 1px solid var(--accent-gold);
            border-radius: 6px;
            color: var(--accent-gold);
            font-size: 1.3rem;
            font-weight: bold;
            text-align: center;
            outline: none;
            box-shadow: inset 0 2px 4px rgba(0,0,0,0.5);
        }

        .buttons-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
        }

        button {
            padding: 14px;
            background: linear-gradient(135deg, var(--accent-gold), #9a7d11);
            color: #0b1321;
            border: none;
            border-radius: 6px;
            font-size: 1.1rem;
            font-weight: bold;
            text-transform: uppercase;
            letter-spacing: 1px;
            cursor: pointer;
            box-shadow: 0 4px 10px rgba(0,0,0,0.4);
            transition: all 0.2s ease;
        }

        button:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 6px 15px rgba(212, 175, 55, 0.4);
        }

        button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
            box-shadow: none;
        }

        .btn-secondary {
            background: linear-gradient(135deg, var(--accent-red), #7f1d1d);
            color: #ffffff;
        }

        #statusText {
            font-size: 1rem;
            text-align: center;
            min-height: 30px;
            line-height: 1.5;
            color: var(--text-gray);
        }

        .win {
            color: #22c55e !important;
            font-weight: bold;
        }

        .lose {
            color: #ef4444 !important;
        }

        .balance-box {
            font-size: 1.1rem;
            font-weight: bold;
            color: var(--accent-gold);
            background: rgba(15, 23, 42, 0.8);
            padding: 8px 16px;
            border-radius: 6px;
            border: 1px solid var(--accent-gold);
        }

        /* Элементы классического стиля */
        .cards-dice {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px 0;
            border-top: 1px solid rgba(212, 175, 55, 0.2);
            border-bottom: 1px solid rgba(212, 175, 55, 0.2);
        }

        .cd-item {
            font-size: 1.5rem;
            color: var(--accent-gold);
        }
    </style>
</head>
<body>

    <div class="header">
        <h1>FCasino</h1>
        <div id="balanceBox" class="balance-box">Баланс: 0 🪙</div>
    </div>

    <div class="panel">
        <div class="cards-dice">
            <span class="cd-item">🂡 🃞 🃚</span>
            <span class="cd-item">🎲 🎲</span>
        </div>

        <div class="slots-container">
            <div class="slot-reel" id="reel1">7</div>
            <div class="slot-reel" id="reel2">7</div>
            <div class="slot-reel" id="reel3">7</div>
        </div>

        <div class="controls">
            <div class="input-group">
                <label for="betAmount">Ставка</label>
                <input type="number" id="betAmount" value="50" min="10" step="10">
            </div>
            <div class="buttons-grid">
                <button id="spinBtn" onclick="playSlots()">Вращать</button>
                <button class="btn-secondary" id="loginBtn" onclick="loginAnon()">Вход</button>
            </div>
        </div>

        <div id="statusText">Инициализация...</div>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyCsd-EMW60Nmk452niquucF3wDfYkQbNlU",
            authDomain: "fcasino-64ooo.firebaseapp.com",
            projectId: "fcasino-64ooo",
            storageBucket: "fcasino-64ooo.firebasestorage.app",
            messagingSenderId: "649497478758",
            appId: "1:649497478758:web:be8656c2ce88d61d438fa7",
            measurementId: "G-DPW70MMJHJ"
        };

        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const db = firebase.firestore();

        let currentUser = null;
        let balance = 0;
        let isSpinning = false;

        const symbols = ['7', 'BAR', '🍒', '🍋', '🔔'];

        function updateDisplay() {
            document.getElementById('balanceBox').innerText = `Баланс: ${balance} 🪙`;
        }

        function loginAnon() {
            const status = document.getElementById('statusText');
            status.innerText = "Вход...";
            status.className = "";
            auth.signInAnonymously().catch((e) => {
                status.innerText = "Ошибка: " + e.message;
                status.className = "lose";
            });
        }

        auth.onAuthStateChanged((user) => {
            if (user) {
                currentUser = user;
                document.getElementById('loginBtn').innerText = "ID: " + user.uid.substring(0, 4);
                
                const userRef = db.collection('users').doc(user.uid);
                
                userRef.onSnapshot((doc) => {
                    if (doc.exists) {
                        balance = doc.data().balance;
                        updateDisplay();
                        document.getElementById('statusText').innerText = "Готовы к игре!";
                        document.getElementById('statusText').className = "";
                    } else {
                        userRef.set({ balance: 5000 });
                    }
                });
            } else {
                document.getElementById('loginBtn').innerText = "Вход";
                document.getElementById('statusText').innerText = "Войдите в систему для игры";
                document.getElementById('statusText').className = "";
                balance = 0;
                updateDisplay();
            }
        });

        async function playSlots() {
            if (isSpinning || !currentUser) return;
            const betInput = parseInt(document.getElementById('betAmount').value);

            if (isNaN(betInput) || betInput <= 0) {
                document.getElementById('statusText').innerText = "Введите корректную ставку!";
                document.getElementById('statusText').className = "lose";
                return;
            }

            if (betInput > balance) {
                document.getElementById('statusText').innerText = "Недостаточно средств!";
                document.getElementById('statusText').className = "lose";
                return;
            }

            isSpinning = true;
            const statusText = document.getElementById('statusText');
            statusText.innerText = "Вращаем барабаны...";
            statusText.className = "";

            // Запускаем полную анимацию
            const reel1 = document.getElementById('reel1');
            const reel2 = document.getElementById('reel2');
            const reel3 = document.getElementById('reel3');

            reel1.classList.add('spin-animation');
            reel2.classList.add('spin-animation');
            reel3.classList.add('spin-animation');

            // Списываем баланс в базе данных
            const userRef = db.collection('users').doc(currentUser.uid);
            await userRef.update({ balance: balance - betInput });

            setTimeout(() => {
                // Останавливаем анимацию
                reel1.classList.remove('spin-animation');
                reel2.classList.remove('spin-animation');
                reel3.classList.remove('spin-animation');

                // Генерация результата
                const res1 = symbols[Math.floor(Math.random() * symbols.length)];
                const res2 = symbols[Math.floor(Math.random() * symbols.length)];
                const res3 = symbols[Math.floor(Math.random() * symbols.length)];

                reel1.innerText = res1;
                reel2.innerText = res2;
                reel3.innerText = res3;

                // Расчет выигрыша
                let winAmount = 0;
                if (res1 === res2 && res2 === res3) {
                    if (res1 === '7') {
                        winAmount = betInput * 10;
                    } else if (res1 === 'BAR') {
                        winAmount = betInput * 5;
                    } else {
                        winAmount = betInput * 3;
                    }
                }

                if (winAmount > 0) {
                    userRef.update({ balance: balance - betInput + winAmount });
                    statusText.innerText = `ПОБЕДА! Выигрыш: +${winAmount} 🪙`;
                    statusText.className = "win";
                } else {
                    statusText.innerText = `Проигрыш. Попробуйте еще раз!`;
                    statusText.className = "lose";
                }

                isSpinning = false;
            }, 2500); // 2.5 секунды анимации
        }
    </script>
</body>
</html>
