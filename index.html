<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>FCasino | Elite Deluxe</title>
    
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>

    <style>
        :root {
            --gold: linear-gradient(180deg, #ffdc6a 0%, #a67c00 100%);
            --deep-blue: #020617;
            --neon-border: #1e293b;
            --panel-bg: #0f172a;
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        body {
            background-color: var(--deep-blue);
            color: #f8fafc;
            font-family: 'Segoe UI', system-ui, sans-serif;
            margin: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 10px;
            overflow: hidden;
            background-image: radial-gradient(circle at center, #1e293b 0%, #020617 100%);
        }

        .casino-container {
            width: 100%;
            max-width: 480px;
            background: var(--panel-bg);
            border: 2px solid var(--neon-border);
            border-radius: 24px;
            padding: 25px;
            box-shadow: 0 30px 60px rgba(0,0,0,0.7), inset 0 1px 1px rgba(255,255,255,0.1);
            position: relative;
        }

        .top-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 25px;
        }

        .logo {
            font-weight: 900;
            font-size: 1.4rem;
            letter-spacing: 2px;
            background: var(--gold);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .balance-display {
            background: rgba(0,0,0,0.4);
            padding: 8px 16px;
            border-radius: 12px;
            border: 1px solid #334155;
            color: #fbbf24;
            font-family: 'Courier New', monospace;
            font-weight: bold;
        }

        /* Окно барабанов */
        .slot-window {
            background: #000;
            height: 180px;
            border-radius: 16px;
            display: flex;
            gap: 10px;
            padding: 10px;
            border: 3px solid #1e293b;
            position: relative;
            overflow: hidden;
            box-shadow: inset 0 0 40px #000;
        }

        .glass-effect {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(180deg, 
                rgba(0,0,0,0.8) 0%, 
                transparent 20%, 
                transparent 80%, 
                rgba(0,0,0,0.8) 100%);
            z-index: 5;
            pointer-events: none;
        }

        .reel-col {
            flex: 1;
            height: 100%;
            position: relative;
        }

        .reel-track {
            display: flex;
            flex-direction: column;
            align-items: center;
            transition: transform 3.8s cubic-bezier(0.15, 0, 0.05, 1.05);
        }

        .icon-box {
            height: 140px;
            width: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 15px;
            flex-shrink: 0;
        }

        .icon-box svg {
            width: 100%;
            height: 100%;
            filter: drop-shadow(0 5px 10px rgba(0,0,0,0.5));
        }

        /* Управление */
        .ui-panel {
            margin-top: 30px;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        input[type="number"] {
            width: 100%;
            background: #020617;
            border: 2px solid #334155;
            color: #fff;
            padding: 18px;
            border-radius: 14px;
            font-size: 1.3rem;
            text-align: center;
            outline: none;
            font-family: 'Courier New', monospace;
        }

        .btn-spin {
            background: var(--gold);
            color: #000;
            border: none;
            padding: 20px;
            border-radius: 14px;
            font-size: 1.5rem;
            font-weight: 900;
            text-transform: uppercase;
            cursor: pointer;
            box-shadow: 0 6px 0 #78350f;
            transition: all 0.1s;
        }

        .btn-spin:active {
            transform: translateY(4px);
            box-shadow: 0 2px 0 #78350f;
        }

        .btn-spin:disabled {
            filter: grayscale(1);
            opacity: 0.5;
        }

        #statusMsg {
            text-align: center;
            font-size: 0.9rem;
            color: #94a3b8;
            font-weight: bold;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        @media (max-width: 400px) {
            .slot-window { height: 150px; }
            .icon-box { height: 115px; }
            .casino-container { padding: 20px; }
        }
    </style>
</head>
<body>

<div class="casino-container">
    <div class="top-bar">
        <div class="logo">FCASINO</div>
        <div class="balance-display" id="balanceDisplay">0 🪙</div>
    </div>

    <div class="slot-window">
        <div class="glass-effect"></div>
        <div class="reel-col"><div id="reel1" class="reel-track"></div></div>
        <div class="reel-col"><div id="reel2" class="reel-track"></div></div>
        <div class="reel-col"><div id="reel3" class="reel-track"></div></div>
    </div>

    <div class="ui-panel">
        <input type="number" id="betInput" value="100">
        <button class="btn-spin" id="spinBtn" onclick="handleSpin()">Spin</button>
        <div id="statusMsg">Ready</div>
    </div>
</div>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyCsd-EMW60Nmk452niquucF3wDfYkQbNlU",
        authDomain: "fcasino-64ooo.firebaseapp.com",
        projectId: "fcasino-64ooo",
        storageBucket: "fcasino-64ooo.firebasestorage.app",
        messagingSenderId: "649497478758",
        appId: "1:649497478758:web:be8656c2ce88d61d438fa7"
    };

    firebase.initializeApp(firebaseConfig);
    const auth = firebase.auth();
    const db = firebase.firestore();

    const ICONS = {
        '7': `<svg viewBox="0 0 24 24"><path d="M6 4h12v2l-8 14h-3l8-14h-9v-2z" fill="#ef4444"/></svg>`,
        'diamond': `<svg viewBox="0 0 24 24"><path d="M12 2L4 10l8 12 8-12-8-8z" fill="#38bdf8"/></svg>`,
        'bar': `<svg viewBox="0 0 24 24"><rect x="2" y="7" width="20" height="10" rx="2" fill="#fbbf24"/><text x="12" y="14" font-size="6" text-anchor="middle" fill="#000" font-weight="bold">BAR</text></svg>`,
        'cherry': `<svg viewBox="0 0 24 24"><circle cx="8" cy="16" r="4" fill="#be123c"/><circle cx="16" cy="14" r="4" fill="#be123c"/><path d="M12 4c0 0-1 6-4 8m4-8c0 0 2 5 4 6" stroke="#15803d" stroke-width="2" fill="none"/></svg>`
    };
    
    const KEYS = Object.keys(ICONS);
    let balance = 0;
    let spinning = false;

    function buildReels() {
        ['reel1', 'reel2', 'reel3'].forEach(id => {
            const track = document.getElementById(id);
            for(let i=0; i<45; i++) {
                const key = KEYS[Math.floor(Math.random() * KEYS.length)];
                const div = document.createElement('div');
                div.className = 'icon-box';
                div.innerHTML = ICONS[key];
                track.appendChild(div);
            }
        });
    }

    buildReels();
    auth.signInAnonymously();

    auth.onAuthStateChanged(user => {
        if(user) {
            db.collection('users').doc(user.uid).onSnapshot(doc => {
                if(doc.exists) {
                    balance = doc.data().balance;
                    document.getElementById('balanceDisplay').innerText = `${balance.toLocaleString()} 🪙`;
                } else {
                    db.collection('users').doc(user.uid).set({ balance: 5000 });
                }
            });
        }
    });

    async function handleSpin() {
        if(spinning) return;
        const bet = parseInt(document.getElementById('betInput').value);

        if(bet > balance || bet <= 0) {
            document.getElementById('statusMsg').innerText = "No Money!";
            return;
        }

        spinning = true;
        const btn = document.getElementById('spinBtn');
        btn.disabled = true;
        document.getElementById('statusMsg').innerText = "Spinning...";

        await db.collection('users').doc(auth.currentUser.uid).update({
            balance: firebase.firestore.FieldValue.increment(-bet)
        });

        const results = [];
        const reelHeight = window.innerWidth <= 400 ? 115 : 140;

        ['reel1', 'reel2', 'reel3'].forEach((id, i) => {
            const track = document.getElementById(id);
            const targetIndex = 40; 
            const key = KEYS[Math.floor(Math.random() * KEYS.length)];
            
            results.push(key);
            track.children[targetIndex].innerHTML = ICONS[key];

            const travel = targetIndex * reelHeight;
            track.style.transition = `transform ${3 + i*0.6}s cubic-bezier(0.1, 0, 0, 1)`;
            track.style.transform = `translateY(-${travel}px)`;
        });

        setTimeout(async () => {
            let mult = 0;
            if(results[0] === results[1] && results[1] === results[2]) {
                mult = (results[0] === '7') ? 20 : 10;
            } else if(results[0] === results[1] || results[1] === results[2]) {
                mult = 2;
            }

            if(mult > 0) {
                const win = bet * mult;
                await db.collection('users').doc(auth.currentUser.uid).update({
                    balance: firebase.firestore.FieldValue.increment(win)
                });
                document.getElementById('statusMsg').innerText = `WIN: +${win}!`;
            } else {
                document.getElementById('statusMsg').innerText = `LOST`;
            }

            setTimeout(() => {
                ['reel1', 'reel2', 'reel3'].forEach((id, i) => {
                    const track = document.getElementById(id);
                    track.style.transition = 'none';
                    track.style.transform = 'translateY(0)';
                    track.children[0].innerHTML = ICONS[results[i]];
                });
                spinning = false;
                btn.disabled = false;
            }, 600);
        }, 4500);
    }
</script>

</body>
</html>
