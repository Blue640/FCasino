<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FCasino | Midnight Edition</title>

    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>

    <style>
        :root {
            --deep-blue: #020617;
            --neon-gold: #fbbf24;
            --neon-blue: #38bdf8;
            --glass-bg: rgba(15, 23, 42, 0.8);
            --border-glow: 0 0 15px rgba(251, 191, 36, 0.3);
        }

        body {
            background-color: var(--deep-blue);
            background-image: 
                radial-gradient(circle at 50% 0%, rgba(56, 189, 248, 0.15) 0%, transparent 50%),
                radial-gradient(circle at 50% 100%, rgba(251, 191, 36, 0.1) 0%, transparent 50%);
            color: #f8fafc;
            font-family: 'Segoe UI', Roboto, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            overflow: hidden;
        }

        .main-frame {
            background: var(--glass-bg);
            border: 2px solid var(--neon-gold);
            border-radius: 24px;
            padding: 40px;
            width: 500px;
            box-shadow: var(--border-glow), 0 20px 50px rgba(0,0,0,0.5);
            backdrop-filter: blur(10px);
            text-align: center;
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
        }

        .logo {
            font-size: 1.8rem;
            font-weight: 900;
            color: var(--neon-gold);
            text-transform: uppercase;
            letter-spacing: 4px;
            text-shadow: 0 0 10px rgba(251, 191, 36, 0.5);
        }

        .balance-tag {
            background: rgba(0,0,0,0.4);
            padding: 8px 15px;
            border-radius: 12px;
            border: 1px solid var(--neon-blue);
            color: var(--neon-blue);
            font-weight: bold;
        }

        /* Система барабанов */
        .slot-machine {
            display: flex;
            justify-content: center;
            gap: 15px;
            background: #000;
            padding: 20px;
            border-radius: 16px;
            border: 1px solid #1e293b;
            margin-bottom: 30px;
            overflow: hidden;
            height: 140px;
            position: relative;
        }

        .slot-machine::after {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background: linear-gradient(180deg, 
                rgba(0,0,0,0.8) 0%, 
                transparent 20%, 
                transparent 80%, 
                rgba(0,0,0,0.8) 100%);
            pointer-events: none;
        }

        .reel {
            width: 100px;
            height: 100%;
            position: relative;
            will-change: transform;
        }

        .reel-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            transition: transform 3s cubic-bezier(0.15, 0, 0.15, 1);
        }

        .symbol {
            height: 100px;
            width: 100px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 3rem;
            flex-shrink: 0;
            text-shadow: 0 0 10px rgba(255,255,255,0.2);
        }

        .symbol.win-glow {
            animation: glow 0.5s ease-in-out infinite alternate;
        }

        @keyframes glow {
            from { text-shadow: 0 0 5px #fff; transform: scale(1); }
            to { text-shadow: 0 0 20px var(--neon-gold); transform: scale(1.1); }
        }

        /* Управление */
        .controls {
            display: grid;
            gap: 20px;
        }

        .bet-input-wrapper {
            position: relative;
        }

        input {
            width: 100%;
            background: #0f172a;
            border: 1px solid #334155;
            padding: 15px;
            border-radius: 12px;
            color: #fff;
            font-size: 1.2rem;
            text-align: center;
            outline: none;
            transition: border 0.3s;
        }

        input:focus {
            border-color: var(--neon-blue);
        }

        .btn-spin {
            background: linear-gradient(135deg, #fbbf24, #d97706);
            color: #000;
            border: none;
            padding: 18px;
            border-radius: 12px;
            font-size: 1.3rem;
            font-weight: 800;
            cursor: pointer;
            text-transform: uppercase;
            box-shadow: 0 4px 15px rgba(217, 119, 6, 0.4);
            transition: all 0.2s;
        }

        .btn-spin:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(217, 119, 6, 0.6);
        }

        .btn-spin:active {
            transform: translateY(1px);
        }

        .btn-spin:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            filter: grayscale(1);
        }

        #status {
            margin-top: 20px;
            font-weight: bold;
            height: 24px;
        }

        .success { color: #4ade80; }
        .error { color: #f87171; }
    </style>
</head>
<body>

    <div class="main-frame">
        <div class="header">
            <div class="logo">FCasino</div>
            <div id="balance" class="balance-tag">Баланс: 0 🪙</div>
        </div>

        <div class="slot-machine">
            <div class="reel"><div id="reel1" class="reel-container"></div></div>
            <div class="reel"><div id="reel2" class="reel-container"></div></div>
            <div class="reel"><div id="reel3" class="reel-container"></div></div>
        </div>

        <div class="controls">
            <div class="bet-input-wrapper">
                <input type="number" id="betAmount" value="100" placeholder="Ваша ставка">
            </div>
            <button id="spinBtn" class="btn-spin" onclick="spin()">Вращать!</button>
        </div>

        <div id="status">Загрузка данных...</div>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyCsd-EMW60Nmk452niquucF3wDfYkQbNlU",
            authDomain: "fcasino-64ooo.firebaseapp.com",
            projectId: "fcasino-64ooo",
            storageBucket: "fcasino-64ooo.firebasestorage.app",
            messagingSenderId: "649497478758",
            appId: "1:649497478758:web:be8656c2ce88d61d438fa7"
        };

        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const db = firebase.firestore();

        const SYMBOLS = ['💎', '🎰', '🔔', '🍒', '7️⃣', '🍋', '⭐'];
        let balance = 0;
        let isSpinning = false;

        // Генерация барабанов для анимации
        function createReelItems(reelId) {
            const reel = document.getElementById(reelId);
            reel.innerHTML = '';
            // Создаем длинную ленту для прокрутки
            for (let i = 0; i < 40; i++) {
                const div = document.createElement('div');
                div.className = 'symbol';
                div.innerHTML = SYMBOLS[Math.floor(Math.random() * SYMBOLS.length)];
                reel.appendChild(div);
            }
        }

        // Первоначальная настройка
        ['reel1', 'reel2', 'reel3'].forEach(createReelItems);

        auth.signInAnonymously();

        auth.onAuthStateChanged(user => {
            if (user) {
                const userRef = db.collection('users').doc(user.uid);
                userRef.onSnapshot(doc => {
                    if (doc.exists) {
                        balance = doc.data().balance;
                        document.getElementById('balance').innerText = `Баланс: ${balance} 🪙`;
                        document.getElementById('status').innerText = "Удачи!";
                    } else {
                        userRef.set({ balance: 1000 });
                    }
                });
            }
        });

        async function spin() {
            if (isSpinning) return;
            
            const bet = parseInt(document.getElementById('betAmount').value);
            const status = document.getElementById('status');
            const btn = document.getElementById('spinBtn');

            if (bet > balance || bet <= 0) {
                status.innerText = "Ошибка ставки!";
                status.className = "error";
                return;
            }

            isSpinning = true;
            btn.disabled = true;
            status.innerText = "Вращаем...";
            status.className = "";

            // Списываем баланс
            await db.collection('users').doc(auth.currentUser.uid).update({
                balance: firebase.firestore.FieldValue.increment(-bet)
            });

            const results = [];
            const reels = ['reel1', 'reel2', 'reel3'];

            reels.forEach((id, index) => {
                const container = document.getElementById(id);
                // Случайный символ в конце ленты
                const resultIndex = Math.floor(Math.random() * SYMBOLS.length);
                const resultSymbol = SYMBOLS[resultIndex];
                results.push(resultSymbol);

                // Ставим результат в последнюю ячейку прокрутки
                container.children[container.children.length - 2].innerHTML = resultSymbol;
                
                // Запускаем смещение
                const offset = (container.children.length - 2) * 100;
                container.style.transition = `transform ${2 + index * 0.5}s cubic-bezier(0.45, 0.05, 0.55, 0.95)`;
                container.style.transform = `translateY(-${offset}px)`;
            });

            setTimeout(async () => {
                // Проверка выигрыша
                let winMultiplier = 0;
                if (results[0] === results[1] && results[1] === results[2]) {
                    winMultiplier = 5;
                    if (results[0] === '7️⃣') winMultiplier = 10;
                    if (results[0] === '💎') winMultiplier = 20;
                } else if (results[0] === results[1] || results[1] === results[2]) {
                    winMultiplier = 2;
                }

                if (winMultiplier > 0) {
                    const winTotal = bet * winMultiplier;
                    await db.collection('users').doc(auth.currentUser.uid).update({
                        balance: firebase.firestore.FieldValue.increment(winTotal)
                    });
                    status.innerText = `ПОБЕДА! +${winTotal}`;
                    status.className = "success";
                } else {
                    status.innerText = "Повезет в следующий раз!";
                    status.className = "";
                }

                // Сброс позиций для следующего раза без анимации
                setTimeout(() => {
                    reels.forEach(id => {
                        const container = document.getElementById(id);
                        container.style.transition = 'none';
                        container.style.transform = 'translateY(0)';
                        // Перемешиваем символы для свежести
                        Array.from(container.children).forEach(child => {
                            child.innerHTML = SYMBOLS[Math.floor(Math.random() * SYMBOLS.length)];
                        });
                        // Возвращаем результат в начало
                        container.children[0].innerHTML = results[reels.indexOf(id)];
                    });
                    isSpinning = false;
                    btn.disabled = false;
                }, 500);

            }, 3500);
        }
    </script>
</body>
</html>
