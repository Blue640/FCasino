<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FCasino - Midnight Edition</title>

    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-analytics-compat.js"></script>

    <style>
        :root {
            --bg-color: #0d111a;
            --card-bg: #151928;
            --accent-cyan: #00e5ff;
            --accent-purple: #9b51e0;
            --text-color: #e2e8f0;
            --red-color: #e53e3e;
            --black-color: #1a202c;
            --green-color: #319795;
            --border-color: #2d3748;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            background-color: var(--card-bg);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            width: 100%;
            max-width: 500px;
            padding: 30px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.6);
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
            padding-bottom: 15px;
            border-bottom: 1px solid var(--border-color);
        }

        .header h1 {
            font-size: 1.6rem;
            color: var(--accent-cyan);
            font-weight: 700;
            letter-spacing: 0.5px;
        }

        .balance-box {
            font-size: 1.1rem;
            font-weight: 600;
            color: #ffffff;
            background: rgba(0, 229, 255, 0.12);
            padding: 8px 16px;
            border-radius: 8px;
            border: 1px solid var(--accent-cyan);
            box-shadow: 0 0 8px rgba(0, 229, 255, 0.2);
        }

        .roulette-wrapper {
            position: relative;
            width: 360px;
            height: 360px;
            margin: 10px auto 30px;
        }

        .pointer {
            width: 0;
            height: 0;
            border-left: 12px solid transparent;
            border-right: 12px solid transparent;
            border-bottom: 24px solid var(--accent-cyan);
            position: absolute;
            top: -10px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 20;
            filter: drop-shadow(0 0 6px var(--accent-cyan));
        }

        .wheel {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            background: var(--black-color);
            border: 12px solid var(--border-color);
            position: relative;
            overflow: hidden;
            transition: transform 7s cubic-bezier(0.1, 0.75, 0.2, 1);
            box-shadow: 0 0 40px rgba(0, 0, 0, 0.8);
        }

        .sector {
            position: absolute;
            width: 50%;
            height: 50%;
            top: 0;
            left: 50%;
            transform-origin: 0% 100%;
            display: flex;
            align-items: center;
            justify-content: flex-end;
            font-size: 12px;
            font-weight: bold;
            color: #fff;
            padding-right: 10px;
        }

        .sector.red { 
            background-color: var(--red-color); 
        }
        .sector.black { 
            background-color: var(--black-color); 
            border: 0.5px solid rgba(255, 255, 255, 0.05);
        }
        .sector.green { 
            background-color: var(--green-color); 
        }

        .ball {
            width: 16px;
            height: 16px;
            background: #ffffff;
            border-radius: 50%;
            position: absolute;
            top: 35px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 10;
            box-shadow: 0 0 12px #ffffff;
            transition: transform 7s cubic-bezier(0.1, 0.75, 0.2, 1);
        }

        .controls {
            display: flex;
            flex-direction: column;
            gap: 18px;
        }

        .input-group {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .input-group label {
            font-size: 0.95rem;
            color: var(--text-color);
            font-weight: 500;
        }

        .input-group input {
            width: 100%;
            padding: 14px;
            background: #1b1f2d;
            border: 1px solid var(--border-color);
            border-radius: 6px;
            color: #fff;
            font-size: 1.1rem;
            outline: none;
            transition: border-color 0.3s, box-shadow 0.3s;
        }

        .input-group input:focus {
            border-color: var(--accent-cyan);
            box-shadow: 0 0 5px rgba(0, 229, 255, 0.4);
        }

        .buttons-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
        }

        button {
            padding: 15px;
            border: none;
            border-radius: 6px;
            font-size: 1.05rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.25s ease-in-out;
            color: #fff;
        }

        .btn-red {
            background: var(--red-color);
            box-shadow: inset 0 -2px 0 rgba(0, 0, 0, 0.3);
        }
        .btn-red:hover {
            background: #b91c1c;
            transform: translateY(-2px);
        }

        .btn-black {
            background: #202635;
            border: 1px solid var(--border-color);
            box-shadow: inset 0 -2px 0 rgba(0, 0, 0, 0.5);
        }
        .btn-black:hover {
            background: #111827;
            transform: translateY(-2px);
            border-color: #374151;
        }

        .btn-login {
            background: transparent;
            border: 1px solid var(--accent-cyan);
            color: var(--accent-cyan);
            padding: 8px 16px;
            border-radius: 6px;
            font-size: 0.9rem;
            font-weight: 500;
            box-shadow: 0 0 3px rgba(0, 229, 255, 0.1);
        }
        .btn-login:hover {
            background: rgba(0, 229, 255, 0.15);
            box-shadow: 0 0 8px rgba(0, 229, 255, 0.4);
        }

        #statusText {
            margin-top: 20px;
            font-size: 0.9rem;
            text-align: center;
            color: var(--accent-cyan);
            min-height: 24px;
            line-height: 1.2;
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="header">
            <h1>FCasino</h1>
            <button class="btn-login" id="loginBtn" onclick="loginAnon()">Анонимный вход</button>
        </div>

        <div class="roulette-wrapper">
            <div class="pointer"></div>
            <div class="wheel" id="wheel"></div>
            <div class="ball" id="ball"></div>
        </div>

        <div class="controls">
            <div class="input-group">
                <label for="betAmount">Сумма ставки</label>
                <input type="number" id="betAmount" value="50" min="10">
            </div>

            <div class="buttons-grid">
                <button class="btn-red" onclick="makeBet('red')">На Красное (x2)</button>
                <button class="btn-black" onclick="makeBet('black')">На Черное (x2)</button>
            </div>
        </div>

        <div id="statusText"></div>
    </div>

    <script>
        // Ваши конфигурационные данные из Firebase
        const firebaseConfig = {
            apiKey: "AIzaSyCsd-EMW60Nmk452niquucF3wDfYkQbNlU",
            authDomain: "fcasino-64ooo.firebaseapp.com",
            projectId: "fcasino-64ooo",
            storageBucket: "fcasino-64ooo.firebasestorage.app",
            messagingSenderId: "649497478758",
            appId: "1:649497478758:web:be8656c2ce88d61d438fa7",
            measurementId: "G-DPW70MMJHJ"
        };

        // Инициализация Firebase
        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const db = firebase.firestore();
        // Подключение analytics, если нужно
        // const analytics = firebase.analytics();

        const wheel = document.getElementById('wheel');
        const ball = document.getElementById('ball');
        const statusText = document.getElementById('statusText');
        
        let currentUser = null;
        let balance = 1000; // Стартовый баланс до загрузки
        let currentRotation = 0;

        // Раскладка Европейской рулетки (37 чисел)
        const wheelNumbers = [
            0, 32, 15, 19, 4, 21, 2, 25, 17, 34, 6, 27, 13, 36, 11, 30, 8, 23, 10,
            5, 24, 16, 33, 1, 20, 14, 31, 9, 22, 18, 29, 7, 28, 12, 35, 3, 26
        ];
        
        // Список красных чисел на колесе
        const reds = [1, 3, 5, 7, 9, 12, 14, 16, 18, 19, 21, 23, 25, 27, 30, 32, 34, 36];

        // Функция инициализации секторов колеса рулетки
        function initWheel() {
            const count = wheelNumbers.length;
            const degreesPerSector = 360 / count;
            wheel.innerHTML = ''; 
            
            wheelNumbers.forEach((number, index) => {
                const sector = document.createElement('div');
                sector.className = 'sector';
                
                if (number === 0) {
                    sector.classList.add('green');
                } else if (reds.includes(number)) {
                    sector.classList.add('red');
                } else {
                    sector.classList.add('black');
                }
                
                sector.innerHTML = `<span>${number}</span>`;
                const angle = index * degreesPerSector;
                sector.style.transform = `rotate(${angle}deg) skewY(${90 - degreesPerSector}deg)`;
                sector.style.width = '50%';
                sector.style.height = '50%';
                
                wheel.appendChild(sector);
            });
        }

        // Анонимная авторизация
        function loginAnon() {
            statusText.innerText = "Выполняется вход...";
            auth.signInAnonymously().then(() => {
                statusText.innerText = "Вход успешно выполнен";
            }).catch((error) => {
                statusText.innerText = "Ошибка входа: " + error.message;
            });
        }

        // Слушатель статуса авторизации
        auth.onAuthStateChanged((user) => {
            if (user) {
                currentUser = user;
                document.getElementById('loginBtn').innerText = "ID: " + user.uid.substring(0, 6) + "...";
                statusText.innerText = "Авторизация прошла успешно. Загрузка профиля...";
                
                const userRef = db.collection('users').doc(user.uid);
                userRef.get().then((doc) => {
                    if (doc.exists) {
                        balance = doc.data().balance;
                        updateBalanceDisplay();
                        statusText.innerText = "Баланс успешно загружен. Готовы к игре!";
                    } else {
                        // Создание нового профиля игрока в Firestore
                        userRef.set({ balance: 1000 }).then(() => {
                            balance = 1000;
                            updateBalanceDisplay();
                            statusText.innerText = "Профиль создан. Начислено 1000 🪙";
                        });
                    }
                }).catch((error) => {
                    statusText.innerText = "Ошибка загрузки: " + error.message;
                });
            } else {
                document.getElementById('loginBtn').innerText = "Анонимный вход";
                statusText.innerText = "Войдите в систему для начала игры";
            }
        });

        // Функция обновления отображения баланса
        function updateBalanceDisplay() {
            let header = document.querySelector('.header');
            if (!document.getElementById('userBalance')) {
                const bal = document.createElement('div');
                bal.id = 'userBalance';
                bal.className = 'balance-box';
                bal.innerText = `Баланс: ${balance} 🪙`;
                header.insertBefore(bal, document.getElementById('loginBtn'));
            } else {
                document.getElementById('userBalance').innerText = `Баланс: ${balance} 🪙`;
            }
        }

        // Функция выполнения ставки
        async function makeBet(betType) {
            const betAmountInput = document.getElementById('betAmount').value;
            const betAmount = parseInt(betAmountInput);

            if (!currentUser) {
                statusText.innerText = "Пожалуйста, войдите в систему!";
                return;
            }

            if (isNaN(betAmount) || betAmount <= 0) {
                statusText.innerText = "Укажите корректную сумму ставки";
                return;
            }

            if (betAmount > balance) {
                statusText.innerText = "Недостаточно средств на балансе";
                return;
            }

            const userRef = db.collection('users').doc(currentUser.uid);
            
            try {
                // Списываем ставку из баланса
                balance -= betAmount;
                await userRef.update({ balance: balance });
                updateBalanceDisplay();
                
                statusText.innerText = "Ставка принята! Вращаем колесо...";

                const randomIndex = Math.floor(Math.random() * wheelNumbers.length);
