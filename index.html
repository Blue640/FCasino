<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>FCasino | Physical Realism</title>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>

    <style>
        :root {
            --panel-color: #0a0a0c;
            --slot-bg: #050505;
            --accent-gold: #c0a060;
            --text-gray: #71717a;
        }

        body {
            background: #020203;
            color: #e4e4e7;
            font-family: 'Inter', system-ui, -apple-system, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            /* Эффект зернистости монитора */
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3 Atemplate%3E%3Cfilter id='noiseFilter'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.65' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noiseFilter)'/%3E%3C/svg%3E");
            opacity: 0.98;
        }

        .casino-machine {
            background: var(--panel-color);
            border: 4px solid #1a1a1e;
            border-radius: 12px;
            padding: 30px;
            width: 460px;
            box-shadow: 
                inset 0 2px 10px rgba(255,255,255,0.05),
                0 30px 60px rgba(0,0,0,0.8);
            position: relative;
        }

        /* Экран слотов с эффектом вогнутого стекла */
        .viewport {
            background: var(--slot-bg);
            height: 160px;
            display: flex;
            gap: 10px;
            padding: 15px;
            border-radius: 6px;
            border: 2px solid #000;
            box-shadow: inset 0 0 20px #000;
            overflow: hidden;
            position: relative;
            margin-bottom: 25px;
        }

        .viewport::before {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background: linear-gradient(180deg, 
                rgba(0,0,0,0.9) 0%, 
                transparent 15%, 
                transparent 85%, 
                rgba(0,0,0,0.9) 100%);
            z-index: 2;
            pointer-events: none;
        }

        /* Блик на стекле */
        .viewport::after {
            content: '';
            position: absolute;
            top: -50%; left: -50%; width: 200%; height: 200%;
            background: radial-gradient(circle at 50% 50%, rgba(255,255,255,0.03) 0%, transparent 50%);
            pointer-events: none;
            z-index: 3;
        }

        .reel {
            flex: 1;
            position: relative;
            border-right: 1px solid rgba(255,255,255,0.02);
        }

        .reel-strip {
            display: flex;
            flex-direction: column;
            align-items: center;
            /* Важно: cubic-bezier для эффекта «отскока» */
            transition: transform 4s cubic-bezier(0.25, 0.1, 0.25, 1.2);
        }

        .symbol {
            height: 130px;
            width: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 3.5rem;
            filter: drop-shadow(0 5px 15px rgba(0,0,0,0.5));
        }

        /* Панель управления (как на реальном пульте) */
        .controls {
            display: grid;
            grid-template-columns: 1fr auto;
            gap: 15px;
        }

        .input-group {
            background: #111114;
            border: 1px solid #27272a;
            border-radius: 8px;
            padding: 10px;
            display: flex;
            flex-direction: column;
        }

        label {
            font-size: 10px;
            text-transform: uppercase;
            color: var(--text-gray);
            margin-bottom: 4px;
            letter-spacing: 1px;
        }

        input {
            background: transparent;
            border: none;
            color: var(--accent-gold);
            font-family: 'Courier New', monospace;
            font-size: 1.5rem;
            outline: none;
            width: 100%;
        }

        .btn-spin {
            background: linear-gradient(180deg, #d4af37 0%, #8a6d3b 100%);
            border: none;
            border-radius: 8px;
            color: #000;
            font-weight: 900;
            font-size: 1.1rem;
            padding: 0 30px;
            cursor: pointer;
            text-transform: uppercase;
            box-shadow: 0 4px 0 #5c4a2a;
            transition: all 0.1s;
        }

        .btn-spin:active {
            transform: translateY(3px);
            box-shadow: 0 1px 0 #5c4a2a;
        }

        .btn-spin:disabled {
            filter: grayscale(1);
            opacity: 0.5;
        }

        .status-display {
            margin-top: 15px;
            font-size: 12px;
            color: var(--text-gray);
            font-family: monospace;
            text-align: left;
            border-left: 2px solid var(--accent-gold);
            padding-left: 10px;
        }
    </style>
</head>
<body>

<div class="casino-machine">
    <div style="display: flex; justify-content: space-between; margin-bottom: 15px;">
        <span style="font-weight: 800; color: #3f3f46;">UNIT_ID: WIWO</span>
        <span id="balance" style="color: var(--accent-gold); font-family: monospace;">CREDITS: 0</span>
    </div>

    <div class="viewport">
        <div class="reel"><div id="reel1" class="reel-strip"></div></div>
        <div class="reel"><div id="reel2" class="reel-strip"></div></div>
        <div class="reel"><div id="reel3" class="reel-strip"></div></div>
    </div>

    <div class="controls">
        <div class="input-group">
            <label>Current Stake</label>
            <input type="number" id="betAmount" value="50">
        </div>
        <button class="btn-spin" id="spinBtn" onclick="spin()">Pull</button>
    </div>

    <div class="status-display" id="status">SYSTEM_READY // WAITING_FOR_INPUT</div>
</div>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyCsd-EMW60Nmk452niquucF3wDfYkQbNlU",
        authDomain: "fcasino-64ooo.firebaseapp.com",
        projectId: "fcasino-64ooo",
        storageBucket: "fcasino-64ooo.firebasestorage.app",
        messagingSenderId: "649497478758",
        appId: "1:649497478758:web:be8656c2ce88d61d438fa7"
    };

    firebase.initializeApp(firebaseConfig);
    const auth = firebase.auth();
    const db = firebase.firestore();

    const SYMBOLS = ['🍒', '🍋', '🔔', '💎', '7️⃣', '⭐', '🍀'];
    let balance = 0;
    let isSpinning = false;

    function initReels() {
        ['reel1', 'reel2', 'reel3'].forEach(id => {
            const el = document.getElementById(id);
            // Создаем 50 символов для длинной прокрутки
            for (let i = 0; i < 50; i++) {
                const div = document.createElement('div');
                div.className = 'symbol';
                div.innerHTML = SYMBOLS[Math.floor(Math.random() * SYMBOLS.length)];
                el.appendChild(div);
            }
        });
    }

    initReels();
    auth.signInAnonymously();

    auth.onAuthStateChanged(user => {
        if (user) {
            db.collection('users').doc(user.uid).onSnapshot(doc => {
                if (doc.exists) {
                    balance = doc.data().balance;
                    document.getElementById('balance').innerText = `CREDITS: ${balance}`;
                } else {
                    db.collection('users').doc(user.uid).set({ balance: 1000 });
                }
            });
        }
    });

    async function spin() {
        if (isSpinning) return;
        const bet = parseInt(document.getElementById('betAmount').value);
        
        if (bet > balance || bet <= 0) {
            updateStatus("ERROR: INSUFFICIENT_FUNDS", true);
            return;
        }

        isSpinning = true;
        document.getElementById('spinBtn').disabled = true;
        updateStatus("PROC: SPINNING_REELS...");

        await db.collection('users').doc(auth.currentUser.uid).update({
            balance: firebase.firestore.FieldValue.increment(-bet)
        });

        const results = [];
        ['reel1', 'reel2', 'reel3'].forEach((id, index) => {
            const strip = document.getElementById(id);
            const resultIndex = Math.floor(Math.random() * SYMBOLS.length);
            const finalSymbol = SYMBOLS[resultIndex];
            results.push(finalSymbol);

            // Устанавливаем результат в конец ленты
            strip.children[strip.children.length - 2].innerHTML = finalSymbol;
            
            // Запускаем физику
            const step = 130; // высота символа
            const targetPos = (strip.children.length - 2) * step;
            
            strip.style.transition = `transform ${3 + index * 0.6}s cubic-bezier(0.25, 0.1, 0.25, 1.15)`;
            strip.style.transform = `translateY(-${targetPos}px)`;
        });

        setTimeout(async () => {
            let winMultiplier = 0;
            if (results[0] === results[1] && results[1] === results[2]) winMultiplier = 10;
            else if (results[0] === results[1] || results[1] === results[2]) winMultiplier = 2;

            if (winMultiplier > 0) {
                const win = bet * winMultiplier;
                await db.collection('users').doc(auth.currentUser.uid).update({
                    balance: firebase.firestore.FieldValue.increment(win)
                });
                updateStatus(`WIN_DETECTED: +${win} CREDITS`);
            } else {
                updateStatus("RESULT: NO_MATCH");
            }

            // Мгновенный сброс для следующего хода
            setTimeout(() => {
                ['reel1', 'reel2', 'reel3'].forEach((id, i) => {
                    const strip = document.getElementById(id);
                    strip.style.transition = 'none';
                    strip.style.transform = 'translateY(0)';
                    strip.children[0].innerHTML = results[i];
                });
                isSpinning = false;
                document.getElementById('spinBtn').disabled = false;
            }, 600);

        }, 4500);
    }

    function updateStatus(msg, error = false) {
        const s = document.getElementById('status');
        s.innerText = msg;
        s.style.color = error ? "#f87171" : "#71717a";
    }
</script>

</body>
</html>
